<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gen X — Software Portfolio</title>
  <meta name="description" content="I make quiet tools for loud problems. A one-page coding portfolio.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%231c3fc4'/%3E%3Ccircle cx='8' cy='8' r='3.5' fill='%23e8f1f5'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css?v=1">
</head>
<body>

  <!-- Backdrop artwork -->
  <div class="backdrop" aria-hidden="true"></div>

  <main id="top" class="page">
    <header class="hero">

      <div class="hero__copy">
        <div class="hero__label">Young Adult / Software</div>
        <h1 class="hero__title">Gen X</h1>
        <div class="hero__motif">Contemporary Soft Club</div>
        <p class="hero__blurb">I make quiet tools for loud problems. Three of them live to the right.</p>
      </div>

      <div id="work" class="wheel">
        <div class="wheel__stage js-stage">
          <div class="wheel__ring js-ring">
            <!-- 12 wheel faces cloned from the template below by main.js -->
          </div>
          <div class="wheel__frame" aria-hidden="true"></div>
        </div>
        <div class="wheel__controls">
          <button class="wheel__btn js-prev" aria-label="Previous project">‹</button>
          <span class="wheel__meta js-active-meta" aria-live="polite"></span>
          <div class="wheel__rule"></div>
          <span class="wheel__counter js-counter"></span>
          <button class="wheel__btn js-next" aria-label="Next project">›</button>
        </div>
      </div>

      <div class="hero__glyphs" aria-hidden="true">JQGL8F0IVKW3&middot;HGRD0Y154LQ9&middot;WERF4/C0ELI7H1&gt;8L93&middot;KEOG8/0IJIH1T4</div>
    </header>
  </main>

  <template class="js-face-template">
    <a class="face" href="#" draggable="false">
      <div class="card">
        <div class="card__shot">[ SCREENSHOT ]<div class="card__scanlines" aria-hidden="true"></div></div>
        <div class="card__body">
          <span class="card__meta"></span>
          <h3 class="card__title"></h3>
          <p class="card__blurb"></p>
          <span class="card__cta">View project &rarr;</span>
        </div>
      </div>
    </a>
  </template>

  <script src="main.js?v=1" defer></script>
</body>
</html>
